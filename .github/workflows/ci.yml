name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Format check
        id: fmt
        run: bun run format:check

      - name: Type check
        id: ts
        run: bunx tsc --noEmit

      - name: Lint
        id: lint
        run: bun run lint

      - name: Verify routes
        id: routes
        run: bun run verify:routes

      - name: Camera regression guard
        id: camera
        run: bun run verify:camera

      - name: Invite normalization test
        id: invite
        run: bun run verify:invite

      - name: Invite flow test
        id: invite-flow
        run: bun run verify:invite-flow

      - name: Consumption ranking test
        id: ranking
        run: bun run verify:ranking

      - name: Recurring cycles test
        id: recurring
        run: bun run verify:recurring

      - name: Service charge filter test
        id: service-charge
        run: bun run verify:service-charge

      - name: Build
        id: build
        run: bun run build

      - name: PR summary comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const steps = [
              ['Prettier',       '${{ steps.fmt.outcome }}'],
              ['TypeScript',     '${{ steps.ts.outcome }}'],
              ['ESLint',         '${{ steps.lint.outcome }}'],
              ['Rotas',          '${{ steps.routes.outcome }}'],
              ['Câmera',         '${{ steps.camera.outcome }}'],
              ['Build',          '${{ steps.build.outcome }}'],
            ];
            const icon = (o) => o === 'success' ? '✅' : o === 'skipped' ? '⏭️' : '❌';
            const body = [
              `### 🛡️ Quality Gate — \`${context.sha.slice(0,7)}\``,
              '',
              '| Etapa | Status |',
              '| --- | :---: |',
              ...steps.map(([n,o]) => `| ${n} | ${icon(o)} \`${o}\` |`),
              '',
              `_Workflow:_ [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const prev = comments.find(c =>
              c.user.type === 'Bot' && c.body?.startsWith('### 🛡️ Quality Gate'));
            if (prev) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: prev.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
